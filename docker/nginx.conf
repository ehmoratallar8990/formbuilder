user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
    gzip_vary on;

    server {
        listen 80;
        server_name _;
        root /var/www/html;
        index index.html;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Renderer bundle — served as static asset
        location /assets/renderer/ {
            alias /var/www/html/assets/renderer/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Static CMS assets (hashed filenames → long cache)
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # PHP API — proxy to PHP-FPM
        location /api/ {
            try_files $uri $uri/ @php;
        }

        location @php {
            root /var/www/api/public;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/api/public/index.php;
            include fastcgi_params;
            fastcgi_read_timeout 60;
        }

        # Direct PHP-FPM for /api/* requests
        location ~ ^/api/.*\.php$ {
            root /var/www/api/public;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/api/public/index.php;
            include fastcgi_params;
        }

        # SPA fallback — Vue Router handles routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Health check (no logging)
        location = /api/health {
            access_log off;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/api/public/index.php;
            include fastcgi_params;
        }
    }
}
